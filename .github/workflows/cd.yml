name: CD Pipeline - Despliegue en Hugging Face

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Actualizamos a v4 para evitar el aviso de Node.js
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      # Actualizamos a v5 para evitar el aviso de Node.js
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install huggingface_hub

      - name: ⚙️ Entrenar Modelo (Generar artefacto)
        run: |
          python model.py

      - name: 🚀 Desplegar a Hugging Face Hub (Nuevo CLI 'hf')
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Iniciar sesión con el nuevo comando
          hf auth login --token $HF_TOKEN
          
          # 2. Crear el repositorio (el || true evita que falle si ya existe)
          hf repos create mi-primer-modelo-cicd --type model || true
          
          # 3. Subir el archivo (Sintaxis: hf upload <repo> <archivo_local> <ruta_destino>)
          hf upload andresdcamacho/mi-primer-modelo-cicd model.pkl