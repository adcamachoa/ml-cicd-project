name: CD Pipeline - Despliegue en Hugging Face

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Instalamos la librería de Hugging Face para usar su CLI
          pip install huggingface_hub

      - name: ⚙️ Entrenar Modelo (Generar artefacto)
        run: |
          python model.py

      - name: 🚀 Desplegar a Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Iniciar sesión usando el token seguro
          huggingface-cli login --token $HF_TOKEN
          
          # 2. Crear un repositorio en Hugging Face (si no existe ya)
          huggingface-cli repo create mi-primer-modelo-cicd --type model --yes || true
          
          # 3. Subir el archivo model.pkl a ese repositorio
          huggingface-cli upload andresdcamacho/mi-primer-modelo-cicd model.pkl --repo-type model